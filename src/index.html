<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melodia</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <script src="https://kit.fontawesome.com/a2e0e6ad65.js" crossorigin="anonymous"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-black text-white">

  <!-- Navbar -->
  <nav class="fixed w-full flex justify-between p-5 bg-black bg-opacity-60">
    <h1 class="text-xl font-bold">Melodia</h1>
  </nav>

  <!-- Hero -->
  <section class="h-screen flex flex-col justify-center items-center text-center">
    <h2 class="text-5xl font-bold">Sua Música, Sua Forma</h2>
    <p class="mt-4 text-gray-300">Descubra novos sons e crie sua vibe</p>
    <button class="mt-6 px-6 py-3 bg-purple-600 rounded-lg">Ouvir Agora</button>
  </section>
  
  <!-- Benefícios -->
<section class="py-20 text-center">
  <h3 class="text-3xl font-bold mb-10">Por que escolher o Melodia?</h3>

  <div class="grid md:grid-cols-3 gap-10 px-10">
    <div>
      <i class="fas fa-music text-4xl text-purple-500"></i>
      <p class="mt-4">Qualidade de som superior</p>
    </div>

    <div>
      <i class="fas fa-headphones text-4xl text-purple-500"></i>
      <p class="mt-4">Playlists personalizadas</p>
    </div>

    <div>
      <i class="fas fa-fire text-4xl text-purple-500"></i>
      <p class="mt-4">Descubra novos artistas</p>
    </div>
  </div>
</section>

<!-- Funcionalidades -->
<section class="py-20 bg-gray-900 text-center">
  <h3 class="text-3xl font-bold mb-10">Funcionalidades</h3>

  <div class="grid md:grid-cols-3 gap-10 px-10">
    <div class="p-6 bg-gray-800 rounded-lg">Modo offline</div>
    <div class="p-6 bg-gray-800 rounded-lg">Recomendações IA</div>
    <div class="p-6 bg-gray-800 rounded-lg">Player inteligente</div>
  </div>
</section>

</body>
</html>
